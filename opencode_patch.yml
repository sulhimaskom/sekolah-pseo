      - name: Get PR Details
        id: pr_details
        run: |
          PR_INFO=$(gh pr view $PR_NUMBER --json title,body,author,headRefName,baseRefName,state,mergeable,reviewDecision,labels,reviews)
          echo "BRANCH_NAME=$(echo "$PR_INFO" | jq -r '.headRefName // empty')" >> $GITHUB_OUTPUT
          echo "BASE_BRANCH=$(echo "$PR_INFO" | jq -r '.baseRefName // empty')" >> $GITHUB_OUTPUT
          echo "MERGEABLE=$(echo "$PR_INFO" | jq -r '.mergeable // empty')" >> $GITHUB_OUTPUT
          echo "REVIEW_DECISION=$(echo "$PR_INFO" | jq -r '.reviewDecision // empty')" >> $GITHUB_OUTPUT

          # Use gh pr checks for CI status as it is more robust than statusCheckRollup
          CHECKS=$(gh pr checks $PR_NUMBER --json state,status,conclusion 2>/dev/null || echo "[]")
          if echo "$CHECKS" | jq -e 'length > 0 and all(.state == "SUCCESS")' > /dev/null; then
            echo "CI_STATUS=SUCCESS" >> $GITHUB_OUTPUT
          elif echo "$CHECKS" | jq -e 'any(.state == "PENDING" or .state == "EXPECTED")' > /dev/null; then
            echo "CI_STATUS=PENDING" >> $GITHUB_OUTPUT
          else
            echo "CI_STATUS=FAILURE" >> $GITHUB_OUTPUT
          fi

          echo "APPROVAL_COUNT=$(echo "$PR_INFO" | jq -r '[.reviews[]? | select(.state == "APPROVED")] | length')" >> $GITHUB_OUTPUT
          echo "HAS_READY_LABEL=$(echo "$PR_INFO" | jq -r '.labels[]? | select(.name == "ready-to-merge") | .name // empty')" >> $GITHUB_OUTPUT
