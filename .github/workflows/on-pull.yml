name: pull

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, review_requested]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write
  pull-requests: write
  actions: read
  repository-projects: write
  id-token: write

concurrency:
  group: oc-agent
  cancel-in-progress: false

jobs:
  ci:
    name: pull
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      IFLOW_API_KEY: ${{ secrets.IFLOW_API_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}

    steps:
      - name: Wait in Queue
        uses: softprops/turnstyle@v3
        with:
          poll-interval-seconds: 30
          same-branch-only: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Configure Git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - name: Install OpenCode CLI
        run: |
          for i in {1..5}; do
            curl -fsSL https://opencode.ai/install | bash && break || sleep 10
          done
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: On-Pull (PR Handler Mode)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IFLOW_API_KEY: ${{ secrets.IFLOW_API_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: |
          PROMPT=$(cat <<'EOF'
          YOU ARE AN AUTONOMOUS SOFTWARE ENGINEERING AGENT.
          YOUR CURRENT ROLE IS: PULL REQUEST HANDLER.

          GOAL:
          Verify, improve, and merge the current Pull Request.

          PROCESS:
          1.  **Context Analysis**:
              - Checkout the PR branch.
              - Sync with the default branch (main).
          2.  **Verification**:
              - Run full build: `npm run build`
              - Run test suite: `npm test`
              - Run linting: `npm run lint`
          3.  **Self-Healing**:
              - If build/test/lint fails, analyze logs and apply fixes directly to the PR branch.
              - Fix all linting warnings (zero tolerance).
          4.  **Security Audit**:
              - Ensure no exposed secrets or obvious vulnerabilities.
          5.  **Merge Decision**:
              - If all checks pass and changes align with repository standards:
                - Add a summary comment to the PR.
                - Merge the PR (use `gh pr merge --auto --squash` or `--admin` if needed).
          6.  **Cleanup**:
              - Close linked issues.

          CONSTRAINTS:
          - Do NOT start new feature phases.
          - Do NOT create new issues unless you find a major blocker.
          - Stay focused on finalizing THIS Pull Request.
          EOF
          )
          timeout -k 1m 90m opencode run "$PROMPT" \
            --model iflowcn/glm-4.6 \
            --thinking false \
            --share false
