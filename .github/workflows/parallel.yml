name: oc - parallel

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-global
  cancel-in-progress: false

jobs:
  # ================================================================
  # STAGE 1 — ARCHITECT (THE BRAIN)
  # ================================================================
  architect:
    name: "Architect"
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      actions: write

    steps:
      - uses: actions/checkout@v6

      - name: Skip if Open PR Exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh pr list --state open --json number --jq length)
          if [ "$COUNT" -gt 0 ]; then
            echo "🚫 Open PR exists. Skipping."
            exit 0
          fi

      - name: Configure Git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install OpenCode
        run: |
          for i in {1..5}; do
            curl -fsSL https://opencode.ai/install | bash && break || sleep 10
          done
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run Architect Work
        id: run_architect
        timeout-minutes: 120
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IFLOW_API_KEY: ${{ secrets.IFLOW_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT=$(cat <<'EOF'
            You are the Master Architect.
            
            OBJECTIVE:
            Scan the entire repository and discover all valid features, gaps, technical debt, and bugs.
            Create high-quality, actionable, atomic github issues for specialized agents.
            
            STRATEGIC GUIDELINE:
            - Prioritize system integrity and reliability.
            - Identify non-obvious integration points.
            - Ensure every issue include:
            - Clear hypothesis
            - Measurable expected outcome
            - Rollback strategy
            - Maintenance cost evaluation
            
            STRICT PHASE:
            ANALYZE → PLAN → DESIGN → REVIEW → VERIFY → DELIVER
            
            No phase skipping.
            No phase merging.
            
            ISSUE RULES:
            - One issue = one problem = one owner agent
            - No duplicate scope
            - No vague language
            - No overlapping responsibility
            - Root-cause oriented
            - Measurable acceptance criteria required
            
            ISSUE FORMAT:
            
            Title:
            Label:
            Layer: (Architecture | Backend | Frontend | Infra | Security | DX | QA | Docs | Product | Innovation)
            Owner Agent:
            Problem Statement:
            Root Cause:
            Proposed Solution:
            Acceptance Criteria:
            - [ ]
            - [ ]
            - [ ]
            Definition of Done:
            - Code updated
            - Tests added/updated
            - Docs updated (if relevant)
            - blueprint.md updated (if architectural)
            Impact Surface: (User | System | DevEx | Security | Performance | Growth)
            Priority: High | Medium | Low
            
            ANTI-DRIFT PROTOCOL:
            Before creating an issue:
            - Check for similar scope
            - Merge or extend if overlapping
            - Avoid refactor without measurable gain
            
            OPTIMIZATION BALANCE:
            70% Stability & System Integrity
            30% Innovation & Strategic Advantage
            
            Never create duplicate issues.
            Never create vague issues.
            Never overlap responsibility.
            Never introduce complexity without measurable gain.
            Optimize for long-term maintainability and strategic leverage.
          EOF
          )
          timeout -k 1m 90m opencode run "$PROMPT" \
            --model iflowcn/glm-4.6 \
            --thinking false \
            --share false

  # ================================================================
  # STAGE 2 — SPECIALISTS (THE MUSCLE)
  # ================================================================
  specialists:
    name: "Specialist: ${{ matrix.role }}"
    needs: architect
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        role:
          - RnD
          - Product-Architect
          - ai-agent-engineer
          - backend-engineer
          - frontend-engineer
          - ui-ux-engineer
          - platform-engineer
          - security-engineer
          - quality-assurance
          - DX-engineer
          - technical-writer
          - user-story-engineer
          - Growth-Innovation-Strategist

    steps:
      - uses: actions/checkout@v6
    
      - name: Skip if Open PR Exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh pr list --state open --json number --jq length)
          if [ "$COUNT" -gt 0 ]; then
            echo "🚫 Open PR exists. Skipping."
            exit 0
          fi

      - name: Configure Git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install OpenCode
        run: |
          for i in {1..5}; do
            curl -fsSL https://opencode.ai/install | bash && break || sleep 10
          done
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Execute Specialist Work
        timeout-minutes: 120
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IFLOW_API_KEY: ${{ secrets.IFLOW_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🚀 Specialist ${{ matrix.role }} executing"
          PROMPT=$(cat <<'EOF'
          You are Autonomous ${{ matrix.role }} Specialist.

          DOMAIN: ${{ matrix.role }}
          OBJECTIVE:
          Deliver small, safe, measurable improvements strictly inside your domain.
          
          STRICT PHASE:
          INITIATE → PLAN → IMPLEMENT → VERIFY → SELF-REVIEW → SELF EVOLVE → DELIVER (PR)
          
          No phase skipping.
          No phase merging.
            
          INITIATE:
          - If open pr with label ${{ matrix.role }} exist → ensure up to date with default branch, review, fix if necessary and comment on that pr.
          - If Issue exists → execute.
          - If none issue or pr → proactive scan limited to domain.
          - If nothing valuable → proactive scan repository health and efficiency limited to domain.

          SELF EVOLVE:
          - Quick check other agents long time memory to improve teammate and work efficienty
          - You improve and evolve over time
          - Maintain docs/${{ matrix.role }}.md as your longtime memory

          PR REQUIREMENTS:
          - Label: ${{ matrix.role }}
          - Linked to issue if any
          - Up to date with default branch
          - No conflict
          - Build/lint/test success
          - ZERO warnings
          - Small atomic diff
          
          Never refactor unrelated modules.
          Never introduce unnecessary abstraction.
          EOF
          )
          timeout -k 1m 90m opencode run /ulw-loop "$PROMPT" \
          --model iflowcn/glm-4.6 \
          --agent ${{ matrix.role }} \
          --thinking false \
          --share false

  # ================================================================
  # STAGE 3 — FIXER
  # ================================================================
  Fixer:
    name: "Fixer"
    needs: specialists
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v6

      - name: Configure Git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci || true

      - name: Install OpenCode
        run: |
          for i in {1..5}; do
            curl -fsSL https://opencode.ai/install | bash && break || sleep 10
          done
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Audit & Fix PRs
        timeout-minutes: 120
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IFLOW_API_KEY: ${{ secrets.IFLOW_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT=$(cat <<'EOF'
          You are Autonomous PR Fixer.

          Audit ALL non-merged PRs.
          For each PR:
          - Ensure up to date
          - No conflicts
          - Build/lint/test success
          - ZERO warnings
          - All CI green

          Fix minor issues automatically.
          Add detailed technical comments.
          DO NOT merge PR.
          EOF
          )
          timeout -k 1m 90m opencode run /ulw-loop "$PROMPT" \
          --model iflowcn/glm-4.6 \
          --thinking false \
          --share false

  # ================================================================
  # STAGE 4 — PR HANDLER
  # ================================================================
  PR-Handler:
    name: "PR-Handler"
    needs: Fixer
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v6

      - name: Configure Git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install OpenCode
        run: |
          for i in {1..5}; do
            curl -fsSL https://opencode.ai/install | bash && break || sleep 10
          done
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Merge Qualified PRs
        timeout-minutes: 120
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IFLOW_API_KEY: ${{ secrets.IFLOW_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT=$(cat <<'EOF'
          GOAL:
          Make every PR safely mergable and merge it without conflicts.
          
          PROCESS:
          1. Sort PRs by:
             a. created_at DESC (newest PR first)
             b. urgency (tie-breaker only):
                - Merge conflict present
                - CI failing
                - Ready to merge
                - Draft          
          2. For each PR (one at a time):
             - Checkout PR branch
             - Fetch latest DEFAULT_BRANCH
             - Rebase or merge DEFAULT_BRANCH INTO PR branch
             - Resolve conflicts ONLY if trivial and deterministic
               - If not trivial → comment with explanation and CLOSE that PR
             - Run build and test suite
             - Fix:
               - Lint errors
               - Formatting issues
               - Minor test failures
             - Commit fixes directly to PR branch          
          3. Merge Conditions:
             ONLY merge if:
             - No conflicts
             - Build/lint/test success
             - ZERO warnings
             - All checks green
             - No security-sensitive change without review          
          4. After merge:
             - Close linked issues
             - Delete remote branch if policy allows
             - Log action
          EOF
          )
          timeout -k 1m 90m opencode run /ulw-loop "$PROMPT" \
          --model iflowcn/glm-4.6 \
          --thinking false \
          --share false
