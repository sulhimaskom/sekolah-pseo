name: on-push
on:
  workflow_dispatch:
  push:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: global
  cancel-in-progress: false

jobs:
  analyze:
    name: on-push-${{ matrix.flow }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        flow: ["00", "01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "on-push"]

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      IFLOW_API_KEY: ${{ secrets.IFLOW_API_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_KEY }}

    steps:
      - name: Wait in Queue
        uses: softprops/turnstyle@v3
        with:
          poll-interval-seconds: 30
          same-branch-only: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.opencode
            ~/.npm
          key: opencode-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-v1
          restore-keys: |
            opencode-${{ runner.os }}-v1
            opencode-${{ runner.os }}-

      - name: Configure Git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - name: Install OpenCode
        run: |
          for i in {1..5}; do
            curl -fsSL https://opencode.ai/install | bash && break || sleep 10
          done
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run Flow
        timeout-minutes: 95
        run: |
          if [ "${{ matrix.flow }}" == "on-push" ]; then
            # Check for open issues
            count=$(gh issue list --state open --json number --jq 'length')
            if [ "$count" != "0" ]; then
              echo "Open issues exist. Skipping on-push base flow."
              exit 0
            fi
            
            timeout -k 1m 90m opencode run "YOU ARE AN AUTONOMOUS SOFTWARE ENGINEERING AGENT. ACT AS REPOSITORY MAINTAINER. FULL SCAN CODEBASE, FIND BUGS, FEATURES, AND DOC GAPS. CREATE ISSUES." \
              --model iflowcn/glm-4.6 \
              --thinking false \
              --share false
          else
            timeout -k 1m 90m opencode run "$(cat .github/prompt/${{ matrix.flow }}.md)" \
              --model iflowcn/glm-4.6 \
              --thinking false \
              --share false
          fi
