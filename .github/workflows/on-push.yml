name: on-push
on:
  workflow_dispatch:
  push:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: global
  cancel-in-progress: false

jobs:
  flows:
    name: "flow: ${{ matrix.flow }}"
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        flow: ['00', '01', '02', '03', '04', '05', '06', '07', '08', '09', '10', '11']
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      IFLOW_API_KEY: ${{ secrets.IFLOW_API_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_KEY }}

    steps:
      - name: Wait in Queue
        uses: softprops/turnstyle@v3
        with:
          poll-interval-seconds: 30
          same-branch-only: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.opencode
            ~/.npm
          key: opencode-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-v1
          restore-keys: |
            opencode-${{ runner.os }}-v1
            opencode-${{ runner.os }}-

      - name: Configure Git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - name: Install OpenCode
        run: |
          for i in {1..5}; do
            curl -fsSL https://opencode.ai/install | bash && break || sleep 10
          done
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: "Execute flow ${{ matrix.flow }}"
        timeout-minutes: 120
        run: |
          timeout -k 1m 90m opencode run "$(cat .github/prompt/${{ matrix.flow }}.md)" \
            --model iflowcn/glm-4.6 \
            --thinking false \
            --share false

  analyze:
    name: on-push
    needs: flows
    runs-on: ubuntu-24.04-arm
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      IFLOW_API_KEY: ${{ secrets.IFLOW_API_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_KEY }}

    steps:
      - name: Wait in Queue
        uses: softprops/turnstyle@v3
        with:
          poll-interval-seconds: 30
          same-branch-only: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.opencode
            ~/.npm
          key: opencode-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-v1
          restore-keys: |
            opencode-${{ runner.os }}-v1
            opencode-${{ runner.os }}-

      - name: Configure Git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - name: Install OpenCode
        run: |
          for i in {1..5}; do
            curl -fsSL https://opencode.ai/install | bash && break || sleep 10
          done
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Check Open Issues
        id: check_issues
        run: |
          count=$(gh issue list --state open --json number --jq 'length')
          echo "open_issue_count=$count" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: on-push
        if: steps.check_issues.outputs.open_issue_count == '0'
        timeout-minutes: 120
        run: |
          PROMPT=$(cat <<'EOF'
          YOU ARE AN AUTONOMOUS SOFTWARE ENGINEERING AGENT.
          YOUR CURRENT ROLE IS: REPOSITORY MAINTAINER & EVOLUTION SPECIALIST.

          GOAL:
          Audit the current state of the repository, identify bugs or technical debt, and ensure everything is documented and tested.

          PHASES:
          1. **Audit (Read-Only)**: Scan the codebase for errors, anti-patterns, or missing documentation.
          2. **Triage**: Compare findings with existing issues to prevent duplicates.
          3. **Hardening**: Strengthen existing features by improving test coverage, fixing bugs, and centralizing logic.
          4. **Refinement**: Update documentation to reflect the current state.

          CONSTRAINTS:
          - Do NOT introduce new complex features unless requested.
          - Prioritize stability and zero linting warnings.
          - Keep changes atomic and verifiable.
          EOF
          )
          timeout -k 1m 90m opencode run "$PROMPT" \
            --model iflowcn/glm-4.6 \
            --thinking false \
            --share false
